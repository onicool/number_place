<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Number Place</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="app-card">
      <section id="home-screen" class="screen screen-active" aria-labelledby="app-title">
        <div class="hero">
          <p class="eyebrow">iPad / Safari / Chrome</p>
          <h1 id="app-title">Number Place</h1>
          <p class="lead">大きく押せて、すぐ分かる。子供向けのやさしいナンプレ。</p>
        </div>

        <div class="panel">
          <h2>How to Play</h2>
          <ol class="steps">
            <li>マスをタップします</li>
            <li>下の数字ボタンをタップします</li>
            <li>同じ数字がぶつかると色で分かります</li>
            <li>Apple Pencil とキーボードでも操作できます</li>
          </ol>
        </div>

        <div class="panel">
          <h2>Difficulty</h2>
          <div class="difficulty-options" role="radiogroup" aria-label="Difficulty">
            <button type="button" class="difficulty-option is-selected" data-difficulty="easy" aria-pressed="true">Easy</button>
            <button type="button" class="difficulty-option" data-difficulty="normal" aria-pressed="false">Normal</button>
          </div>
          <p id="difficulty-copy" class="support-text">空きマスが少なめで、進めやすい問題です。</p>
        </div>

        <div class="home-actions">
          <button id="start-button" type="button" class="primary-button">Start</button>
          <button id="continue-button" type="button" class="secondary-button">Continue</button>
        </div>
      </section>

      <section id="game-screen" class="screen" aria-labelledby="game-title" hidden>
        <header class="game-header">
          <div class="game-title-group">
            <p class="eyebrow">Mode</p>
            <h2 id="game-title">Easy</h2>
          </div>
          <div class="header-meta">
            <div class="time-chip">
              <span class="status-label">Time</span>
              <strong id="timer">00:00</strong>
            </div>
            <div class="time-chip progress-chip">
              <span class="status-label">Remain</span>
              <strong id="remaining-cells">81</strong>
            </div>
            <details id="game-menu" class="game-menu">
            <summary class="menu-summary">Menu</summary>
            <div class="menu-panel">
              <button id="undo-button" type="button" class="header-button">Undo</button>
              <button id="hint-button" type="button" class="header-button accent">Hint</button>
              <button id="home-button" type="button" class="header-button">Home</button>
              <button id="new-game-button" type="button" class="header-button">New Game</button>
            </div>
            </details>
          </div>
        </header>

        <div class="sr-only" aria-live="polite">
          <p id="message-text">マスをえらんで、数字を入れてみよう。</p>
          <span id="hint-count">0</span>
          <span id="selected-cell-label">なし</span>
        </div>

        <div id="game-main" class="game-main">
          <div id="board-wrap" class="board-wrap panel board-panel">
            <div id="board" class="board" role="grid" aria-label="ナンプレの盤面"></div>
          </div>

          <aside id="control-column" class="control-column">
            <div class="keypad panel">
              <div id="number-pad" class="number-pad" aria-label="数字入力"></div>
              <div class="keypad-actions">
                <button id="erase-button" type="button" class="secondary-button">Erase</button>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div id="clear-modal" class="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="clear-title">
      <p class="eyebrow">Clear</p>
      <h2 id="clear-title">できた！</h2>
      <p id="clear-summary">最後までできました。</p>
      <div class="modal-actions">
        <button id="play-again-button" type="button" class="primary-button">Play Again</button>
        <button id="modal-home-button" type="button" class="secondary-button">Home</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
